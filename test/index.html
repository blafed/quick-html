<!DOCTYPE html>
<html>

<head>
    <title>Canvas Renderer</title>
</head>

<body>
    <canvas id="main" width="800" height="600" style="border:1px solid black;"></canvas>
    <script>
        const canvas = document.getElementById('main');
        const ctx = canvas.getContext('2d');

        const socket = new WebSocket('ws://localhost:8126'); // Replace with your server address.

        socket.onmessage = function (event) {
            console.log(event);
            console.log('recieve', event.data);
            try {
                eval(event.data); // Execute the received JavaScript code.
            } catch (err) {
                console.error("Error evaluating code:", err);
            }
        };

        socket.onopen = () => console.log("WebSocket connected.");
        socket.onclose = () => console.log("WebSocket disconnected.");
    </script>
</body>

</html>
